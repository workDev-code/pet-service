services:
  postgres:
    image: postgres:16-alpine
    container_name: pet-service-postgres
    environment:
      POSTGRES_DB: pet_service
      POSTGRES_USER: pet_service
      POSTGRES_PASSWORD: pet_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pet_service -d pet_service"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
