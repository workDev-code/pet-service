server:
  port: 8080

spring:
  application:
    name: pet-service-booking
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pet_service}
    username: ${DB_USERNAME:pet_service}
    password: ${DB_PASSWORD:pet_service}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-256-bit}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
